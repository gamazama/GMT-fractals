<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GMT - Mesh Export</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html { background-color: #000; scrollbar-width: thin; scrollbar-color: #333 #000; color-scheme: dark; }
      body { margin: 0; padding: 0; width: 100%; min-height: 100vh; background-color: #000; }
      ::-webkit-scrollbar { width: 3px; height: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    </style>
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <script type="module" crossorigin src="./assets/mesh-export-DbbjwhBo.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/three-DQWx7qFd.js">
    <link rel="modulepreload" crossorigin href="./assets/three-fiber-GKfjny8F.js">
    <link rel="modulepreload" crossorigin href="./assets/three-drei-D6d-dyvY.js">
    <link rel="modulepreload" crossorigin href="./assets/pako-DwGzBETv.js">
    <link rel="modulepreload" crossorigin href="./assets/CollapsibleSection-BjKaktlT.js">
    <link rel="modulepreload" crossorigin href="./assets/FormulaFormat-LtqhZbWh.js">
  <link rel="manifest" href="./manifest.webmanifest"></head>
  <body>
    <div id="root"></div>
    <!-- PWA auto-update: mesh-export has no topbar, so it can't host
         the engine's "Update" pill. Instead, force-update any waiting
         service worker on every page load. SKIP_WAITING is handled by
         the default Workbox SW that vite-plugin-pwa generates. -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((regs) => {
          regs.forEach((reg) => {
            reg.update().catch(() => {});
            if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
          });
        });
      }
    </script>
  </body>
</html>
