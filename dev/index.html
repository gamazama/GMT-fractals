    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
      @layer components {
        /* TYPOGRAPHY */
        .t-label {
          @apply text-[10px] font-bold text-gray-500;
        }
        .t-label-sm {
          @apply text-[9px] font-bold text-gray-500;
        }
        .t-value {
          @apply text-xs font-mono text-gray-200;
        }

        /* HEADERS & SECTIONS */
        .t-section-header {
          @apply px-3 py-1.5 bg-black/20 border-b border-white/5 flex items-center justify-between shrink-0;
        }
        .t-section-title {
          @apply text-[9px] font-bold text-gray-500;
        }

        /* CONTAINERS */
        .glass-panel {
          @apply bg-black/95 backdrop-blur-xl border border-white/20 rounded-lg shadow-[0_0_50px_rgba(0,0,0,0.5)];
        }
        .panel-header {
          @apply flex items-center justify-between px-2 py-1.5 bg-gray-800/80 border-b border-white/10 select-none shrink-0;
        }
        .panel-section {
          @apply px-3 py-1.5 bg-black/20 border-b border-white/5 flex justify-between items-center shrink-0;
        }
        
        /* INTERACTIVE ELEMENTS */
        .icon-btn {
          @apply p-1.5 rounded transition-colors text-gray-400 hover:text-white hover:bg-white/10 disabled:opacity-30 disabled:cursor-not-allowed cursor-pointer;
        }
        .icon-btn-active {
          @apply bg-cyan-900/50 text-cyan-300 border border-cyan-700/50;
        }
        .icon-btn-danger {
          @apply text-red-500 hover:text-red-300 hover:bg-red-900/20;
        }

        /* FORMS & INPUTS */
        .t-input {
          @apply w-full bg-gray-900 border border-gray-700 rounded px-2 py-1 text-xs text-white outline-none focus:border-cyan-500 transition-colors;
        }
        .t-dropdown {
          @apply w-full bg-gradient-to-b from-[#1a1a1a] to-transparent border border-white/5 text-[10px] font-medium text-gray-300 tracking-tight rounded px-2 py-1 outline-none focus:border-cyan-500 appearance-none hover:bg-white/5 transition-colors cursor-pointer text-center;
        }
        /* FIX: Explicitly style child options to prevent white background in some browsers */
        .t-dropdown option {
          @apply bg-[#1a1a1a] text-gray-300;
        }
        
        /* BUTTONS */
        .t-btn {
          @apply min-h-[26px] py-1 px-3 text-[9px] font-bold border rounded transition-all truncate flex items-center justify-center gap-2 select-none;
        }
        .t-btn-sm {
          @apply py-0.5 px-2 text-[9px] font-bold border rounded transition-all truncate flex items-center justify-center gap-1 select-none;
        }
        .t-btn-default {
          @apply bg-gradient-to-b from-[#1a1a1a] to-transparent border-white/10 text-gray-400 hover:text-white hover:bg-white/5 hover:border-white/20;
        }

        /* SELECTS */
        .t-select {
          @apply w-full bg-black/40 border border-white/10 text-[10px] font-medium text-gray-300 rounded px-2 py-1 outline-none focus:border-cyan-500/50 appearance-none hover:border-white/20 transition-colors cursor-pointer;
        }
        .t-select option {
          @apply bg-[#111] text-gray-300;
        }
      }
    </style>

    <style>
      /* FIX: color-scheme: dark forces browser native controls (scrollbars, inputs) to use dark theme */
      html { background-color: #000; scrollbar-width: thin; scrollbar-color: #333 #000; color-scheme: dark; }
      body { margin: 0; padding: 0; width: 100%; min-height: 100%; background-color: #000; overscroll-behavior-y: none; }
      body::-webkit-scrollbar { width: 3px; }
      body::-webkit-scrollbar-track { background: #000; }
      body::-webkit-scrollbar-thumb { background-color: #444; border-radius: 3px; }
      ::-webkit-scrollbar { width: 3px; height: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
      .custom-scroll { scrollbar-width: thin; scrollbar-color: rgba(255, 255, 255, 0.15) transparent; -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; }
      .custom-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
      .custom-scroll::-webkit-scrollbar-thumb { background-color: rgba(255, 255, 255, 0.15); border-radius: 10px; border: 3px solid transparent; background-clip: content-box; }
      input[type=range].precision-slider { -webkit-appearance: none; appearance: none; background: transparent; margin: 0; width: 100%; }
      input[type=range].precision-slider:focus { outline: none; }
      input[type=range].precision-slider::-webkit-slider-runnable-track { background: transparent; border: none; height: 100%; }
      input[type=range].precision-slider::-moz-range-track { background: transparent; border: none; height: 100%; }
      input[type=range].precision-slider::-webkit-slider-thumb { -webkit-appearance: none; height: 100%; width: 16px; cursor: ew-resize; border: none; margin-top: 0; background: transparent; border-left: 1px solid rgba(255,255,255,0.25); border-right: 1px solid rgba(255,255,255,0.25); box-sizing: border-box; transition: border-color 0.15s; }
      input[type=range].precision-slider::-webkit-slider-thumb:hover { border-left-color: rgba(255,255,255,0.5); border-right-color: rgba(255,255,255,0.5); }
      input[type=range].precision-slider::-moz-range-thumb { height: 100%; width: 16px; cursor: ew-resize; border: none; background: transparent; border-left: 1px solid rgba(255,255,255,0.25); border-right: 1px solid rgba(255,255,255,0.25); box-sizing: border-box; border-radius: 0; }
      
      @keyframes slider-entry { from { max-height: 0; opacity: 0; transform: translateY(-4px); } to { max-height: 1000px; opacity: 1; transform: translateY(0); } }
      .animate-slider-entry { animation: slider-entry 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards; overflow: hidden; }

      /* UTILITY ANIMATIONS */
      @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
      .animate-fade-in { animation: fade-in 16ms linear forwards; }
      
      @keyframes fade-in-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in-up { animation: fade-in-up 0.3s ease-out forwards; }

      @keyframes fade-in-down { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in-down { animation: fade-in-down 0.3s ease-out forwards; }
      
      @keyframes fade-in-left { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
      .animate-fade-in-left { animation: fade-in-left 0.3s ease-out forwards; }
      
      @keyframes fade-in-right { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
      .animate-fade-in-right { animation: fade-in-right 0.3s ease-out forwards; }

      @keyframes pop-in { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
      .animate-pop-in { animation: pop-in 0.15s ease-out forwards; }
    </style>
