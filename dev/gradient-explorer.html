    <style>
      html { background-color: #000; scrollbar-width: thin; scrollbar-color: #333 #000; color-scheme: dark; min-height: 100%; }
      body { margin: 0; padding: 0; width: 100%; min-height: 100%; background-color: #000; overscroll-behavior-y: none; }
      @media (hover: hover) and (pointer: fine) {
        html, body { height: 100vh; overflow: hidden; }
      }
      ::-webkit-scrollbar { width: 3px; height: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
      .mobile-scroll::-webkit-scrollbar { width: 10px; height: 10px; }
      .mobile-scroll::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.25); border-radius: 6px; }
      /* Reserve the dock scrollbar's gutter so the panel content box keeps a constant
         width when the (classic) scrollbar toggles. The Picker's theme chips flow
         unbounded (flex-wrap), making the panel height width-dependent; without a stable
         gutter the scrollbar appearing reflows the chips, which the ScrollSpaceReserver
         turns into a flicker loop. Scoped to the dock content (relative + py-2 +
         custom-scroll) so it stays in THIS app and doesn't touch dropdown/menu scrollers
         or any other GMT app's docks. */
      .custom-scroll.relative.py-2 { scrollbar-gutter: stable; }
    </style>
