    <style>
      html { background-color: #000; scrollbar-width: thin; scrollbar-color: #333 #000; color-scheme: dark; min-height: 100%; overflow-x: clip; }
      /* `overflow-x: clip` (NOT hidden) stops sideways scroll-off without
         turning the root into its own scroll container; `overscroll-behavior:
         none` on both axes kills rubber-band bounce so a touch the canvas
         doesn't consume can't drag the page off an edge. (GE mounts the
         dvh MobileViewportShell but no MobileScrollIntro spacer, so there's
         no document scroll to address-bar-collapse — these are purely the
         off-edge guards. See ADR-0039.) */
      body { margin: 0; padding: 0; width: 100%; min-height: 100%; background-color: #000; overflow-x: clip; overscroll-behavior: none; }
      @media (hover: hover) and (pointer: fine) {
        html, body { height: 100vh; overflow: hidden; }
      }
      ::-webkit-scrollbar { width: 3px; height: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
      .mobile-scroll::-webkit-scrollbar { width: 10px; height: 10px; }
      .mobile-scroll::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.25); border-radius: 6px; }
    </style>
