<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/png" href="/favicon.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
        <title>GMT · Fractal Explorer</title>
        <style>
            /* Body must NOT be overflow:hidden on mobile — the address-bar
               collapse trick depends on a 100vh element being taller than
               the visible viewport (when the address bar is showing), so
               the body has scroll capacity. Once the user swipes past the
               intro, the address bar hides and the sticky shell locks. */
            /* color-scheme: dark tells auto-darkening browsers (Samsung Internet
               Dark mode, Chrome Android Auto-dark / Force-Dark, some WebViews)
               that the page already provides a dark theme, so they skip the
               automatic darkening pass that otherwise dims the white GMT logo
               to grey on those devices. Every other app entry already sets this. */
            html, body, #root { margin: 0; padding: 0; width: 100%; background: #000; color: #fff; color-scheme: dark; }
            /* `overflow-x: clip` (NOT hidden) kills sideways scroll-off
               without turning the root into its own scroll container —
               `hidden` would force overflow-y to `auto`, making the body
               the scroller instead of the documentElement, which BREAKS
               the iOS address-bar collapse (collapse is tied to the
               documentElement scroll). `clip` doesn't create a scroll
               container, so vertical scrolling still propagates to the
               viewport. See ADR-0039. */
            html { min-height: 100%; overflow-x: clip; scroll-snap-type: y mandatory; }
            /* `overscroll-behavior: none` on BOTH axes stops rubber-band
               bounce, so a touch the canvas doesn't consume can't drag the
               page off any edge. Snap points (on the intro splash and the
               sticky shell) give the body's only scroll exactly two rest
               states — splash, or fullscreen shell — so the page can't
               rest half-scrolled or drift past the shell off the bottom. */
            body { min-height: 100%; overflow-x: clip; overscroll-behavior: none; }
            /* Desktop: lock to viewport so the layout doesn't accidentally scroll. */
            @media (hover: hover) and (pointer: fine) {
                html, body, #root { height: 100%; overflow: hidden; scroll-snap-type: none; }
            }
            /* Thicker touch scrollbars where elements opt in via .mobile-scroll. */
            .mobile-scroll::-webkit-scrollbar { width: 10px; height: 10px; }
            .mobile-scroll::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.25); border-radius: 6px; }
            .mobile-scroll::-webkit-scrollbar-track { background: transparent; }
        </style>
        <!-- Apply the saved UI color scheme before first paint (gmt.colorScheme
             is shared across all GMT apps; absent/"dark" = the :root default). -->
        <script>try{var t=localStorage.getItem('gmt.colorScheme');if(t&&t!=='dark')document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/app-gmt/main.tsx"></script>
    </body>
</html>
