<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mandelbulb VDB Export</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Courier New', monospace; background: #111; color: #ddd; padding: 24px; }
h1 { font-size: 18px; margin-bottom: 16px; color: #fff; }
.controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
label { font-size: 13px; }
select, input[type=number] { background: #222; color: #eee; border: 1px solid #444; padding: 4px 8px; font-family: inherit; font-size: 13px; }
input[type=number] { width: 56px; }
button { background: #2a5; color: #fff; border: none; padding: 6px 16px; cursor: pointer; font-family: inherit; font-size: 13px; }
button:hover { background: #3b6; }
button:disabled { background: #333; color: #666; cursor: default; }
#status { font-size: 13px; color: #fa0; min-height: 18px; margin-bottom: 8px; }
.progress-bar { width: 400px; height: 6px; background: #222; border-radius: 3px; overflow: hidden; margin-bottom: 12px; }
.progress-fill { height: 100%; background: #2a5; width: 0%; transition: width 0.1s; }
canvas { border: 1px solid #333; image-rendering: pixelated; }
.info { font-size: 11px; color: #888; margin-top: 8px; max-width: 700px; line-height: 1.5; }
.info .opt { color: #2a5; }
</style>
</head>
<body>

<h1>Mandelbulb &rarr; VDB Export</h1>

<div class="controls">
  <label>Resolution
    <select id="res">
      <option value="64">64&sup3;</option>
      <option value="128">128&sup3;</option>
      <option value="256" selected>256&sup3;</option>
      <option value="512">512&sup3;</option>
      <option value="1024">1024&sup3;</option>
      <option value="2048">2048&sup3;</option>
    </select>
  </label>
  <label>Power <input type="number" id="power" value="8" min="2" max="20"></label>
  <label>Iterations <input type="number" id="iters" value="12" min="2" max="30"></label>
  <label>Mode
    <select id="mode">
      <option value="solid">Solid</option>
      <option value="shell">Shell</option>
    </select>
  </label>
  <button id="genBtn" onclick="generate()">Generate</button>
  <button id="dlBtn" onclick="download()" disabled>Download .vdb</button>
</div>

<div id="status"></div>
<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
<canvas id="preview" width="256" height="256"></canvas>
<div class="info" id="info"></div>

<script>
// ============================================================
//  Float16 LUT
// ============================================================
const _f32 = new Float32Array(1);
const _u32 = new Uint32Array(_f32.buffer);
function floatToHalf(v) {
  _f32[0] = v;
  const x = _u32[0];
  const sign = (x >> 16) & 0x8000;
  const exp  = ((x >> 23) & 0xFF) - 127 + 15;
  const frac = x & 0x7FFFFF;
  if (exp <= 0)  return sign;
  if (exp >= 31) return sign | 0x7C00;
  return sign | (exp << 10) | (frac >> 13);
}
const BYTE_TO_HALF = new Uint16Array(256);
for (let i = 0; i < 256; i++) BYTE_TO_HALF[i] = floatToHalf(i / 255.0);

// ============================================================
//  Binary Writer
// ============================================================
class BW {
  constructor(size = 8 * 1024 * 1024) {
    this.buf = new ArrayBuffer(size);
    this.a = new Uint8Array(this.buf);
    this.v = new DataView(this.buf);
    this.pos = 0;
  }
  grow(need) {
    const ns = Math.max(this.buf.byteLength * 2, this.pos + need);
    const nb = new ArrayBuffer(ns);
    new Uint8Array(nb).set(this.a);
    this.buf = nb; this.a = new Uint8Array(nb); this.v = new DataView(nb);
  }
  en(n) { if (this.pos + n > this.buf.byteLength) this.grow(n); }
  u8(v)  { this.en(1); this.v.setUint8(this.pos, v); this.pos++; }
  u16(v) { this.en(2); this.v.setUint16(this.pos, v, true); this.pos += 2; }
  u32(v) { this.en(4); this.v.setUint32(this.pos, v, true); this.pos += 4; }
  i32(v) { this.en(4); this.v.setInt32(this.pos, v, true); this.pos += 4; }
  u64(v) { this.en(8); this.v.setBigUint64(this.pos, v, true); this.pos += 8; }
  f64(v) { this.en(8); this.v.setFloat64(this.pos, v, true); this.pos += 8; }
  raw(a) { this.en(a.length); this.a.set(a, this.pos); this.pos += a.length; }
  str(s) { this.en(s.length); for (let i = 0; i < s.length; i++) this.a[this.pos++] = s.charCodeAt(i); }
  name(s) { this.u32(s.length); this.str(s); }
  zeros(n) { this.en(n); this.pos += n; }
  // Bulk typed-array copy (LE platforms = all modern browsers)
  bulk64(arr) { const n = arr.length * 8; this.en(n); this.a.set(new Uint8Array(arr.buffer, arr.byteOffset, n), this.pos); this.pos += n; }
  bulk16(arr) { const n = arr.length * 2; this.en(n); this.a.set(new Uint8Array(arr.buffer, arr.byteOffset, n), this.pos); this.pos += n; }
  result() { return this.buf.slice(0, this.pos); }
}

// ============================================================
//  VDB Sparse Tree with Tile Support
// ============================================================
// 5-4-3 tree. Bit index = z | (y << log2dim) | (x << 2*log2dim)
// Tiles: uniform regions stored as single value in parent header.

const FULL64 = 0xFFFFFFFFFFFFFFFFn;

function createTree() {
  return {
    n5childMask:  new BigUint64Array(512),   // node4 children
    n5valueMask:  new BigUint64Array(512),   // node5-level tiles
    n5tileValues: new Uint16Array(32768),    // f16 tile values
    n4map: new Map()                          // n5idx -> node4
  };
}

function createNode4() {
  return {
    childMask:  new BigUint64Array(64),
    valueMask:  new BigUint64Array(64),
    tileValues: new Uint16Array(4096),
    leafMap:    new Map()
  };
}

// Add an 8^3 leaf block. densityBytes[512] indexed in VDB order: lz|(ly<<3)|(lx<<6).
function addLeafBlock(tree, bx, by, bz, densityBytes) {
  const mask = new BigUint64Array(8);
  const data = new Uint16Array(512);
  let count = 0;
  for (let i = 0; i < 512; i++) {
    if (densityBytes[i] > 0) {
      mask[i >> 6] |= 1n << BigInt(i & 63);
      data[i] = BYTE_TO_HALF[densityBytes[i]];
      count++;
    }
  }
  if (count === 0) return 0;

  const x = bx << 3, y = by << 3, z = bz << 3;
  const n5idx = ((z & 4095) >> 7) | (((y & 4095) >> 7) << 5) | (((x & 4095) >> 7) << 10);
  tree.n5childMask[n5idx >> 6] |= 1n << BigInt(n5idx & 63);

  let n4 = tree.n4map.get(n5idx);
  if (!n4) { n4 = createNode4(); tree.n4map.set(n5idx, n4); }

  const n4idx = ((z & 127) >> 3) | (((y & 127) >> 3) << 4) | (((x & 127) >> 3) << 8);
  n4.childMask[n4idx >> 6] |= 1n << BigInt(n4idx & 63);
  n4.leafMap.set(n4idx, { mask, data });
  return count;
}

// ============================================================
//  Tile Promotion (industry-standard optimization)
// ============================================================
// 1. Uniform leaves (all 512 voxels identical) -> node4 tiles
// 2. Fully-tiled uniform node4s -> node5 tiles
function optimizeTree(tree) {
  let promotedLeaves = 0, promotedN4s = 0;
  const leavesBeforeOpt = [...tree.n4map.values()].reduce((s, n4) => s + n4.leafMap.size, 0);

  for (const [n5k, n4] of tree.n4map) {
    // Pass 1: promote uniform leaves to node4 tiles
    const toPromote = [];
    for (const [n4k, leaf] of n4.leafMap) {
      // Must be fully active (all 512 bits set)
      let full = true;
      for (let i = 0; i < 8; i++) { if (leaf.mask[i] !== FULL64) { full = false; break; } }
      if (!full) continue;
      // Must have uniform data
      const v0 = leaf.data[0];
      let uniform = true;
      for (let i = 1; i < 512; i++) { if (leaf.data[i] !== v0) { uniform = false; break; } }
      if (!uniform) continue;
      toPromote.push([n4k, v0]);
    }
    for (const [n4k, val] of toPromote) {
      n4.leafMap.delete(n4k);
      n4.childMask[n4k >> 6]  &= ~(1n << BigInt(n4k & 63));
      n4.valueMask[n4k >> 6]  |=  1n << BigInt(n4k & 63);
      n4.tileValues[n4k] = val;
      promotedLeaves++;
    }

    // Pass 2: if node4 has only tiles (no leaf children) and all 4096 are same value -> node5 tile
    if (n4.leafMap.size === 0) {
      let allFull = true;
      for (let i = 0; i < 64; i++) { if (n4.valueMask[i] !== FULL64) { allFull = false; break; } }
      if (allFull) {
        const v0 = n4.tileValues[0];
        let uniform = true;
        for (let i = 1; i < 4096; i++) { if (n4.tileValues[i] !== v0) { uniform = false; break; } }
        if (uniform) {
          tree.n4map.delete(n5k);
          tree.n5childMask[n5k >> 6] &= ~(1n << BigInt(n5k & 63));
          tree.n5valueMask[n5k >> 6] |=  1n << BigInt(n5k & 63);
          tree.n5tileValues[n5k] = v0;
          promotedN4s++;
        }
      }
    }
  }

  const leavesAfterOpt = [...tree.n4map.values()].reduce((s, n4) => s + n4.leafMap.size, 0);
  return { leavesBeforeOpt, promotedLeaves, promotedN4s, leavesAfterOpt };
}

// ============================================================
//  VDB Serialization
// ============================================================
function sortedKeys(map) { return [...map.keys()].sort((a, b) => a - b); }

function serializeVDB(tree, N) {
  const leafCount = [...tree.n4map.values()].reduce((s, n4) => s + n4.leafMap.size, 0);
  const estSize = 200000 + leafCount * 1200 + tree.n4map.size * 10000;
  const w = new BW(Math.max(estSize, 1024 * 1024));

  // Header
  w.raw(new Uint8Array([0x20, 0x42, 0x44, 0x56, 0, 0, 0, 0]));
  w.u32(224); w.u32(8); w.u32(1);
  w.u8(0);
  w.str('d2b59639-ac2f-4047-9c50-9648f951180c');
  w.u32(0); w.u32(1);

  // Grid
  w.name('density');
  w.name('Tree_float_5_4_3_HalfFloat');
  w.u32(0);
  w.u64(BigInt(w.pos + 24));
  w.u64(0n); w.u64(0n);
  w.u32(0);

  // Metadata
  w.u32(4);
  metaS(w, 'class', 'unknown');
  metaS(w, 'file_compression', 'none');
  metaB(w, 'is_saved_as_half_float', true);
  metaS(w, 'name', 'density');

  // Transform
  const s = 3.0 / N, t = -1.5;
  w.name('AffineMap');
  w.f64(s); w.f64(0); w.f64(0); w.f64(0);
  w.f64(0); w.f64(s); w.f64(0); w.f64(0);
  w.f64(0); w.f64(0); w.f64(s); w.f64(0);
  w.f64(t); w.f64(t); w.f64(t); w.f64(1);

  // Tree
  writeTree(w, tree);
  return w.result();
}

function metaS(w, k, v) { w.name(k); w.name('string'); w.name(v); }
function metaB(w, k, v) { w.name(k); w.name('bool'); w.u32(1); w.u8(v ? 1 : 0); }

function writeTree(w, tree) {
  // Root header
  w.u32(1); w.u32(0); w.u32(0); w.u32(1);

  // Node5 header
  w.i32(0); w.i32(0); w.i32(0);
  w.bulk64(tree.n5childMask);
  w.bulk64(tree.n5valueMask);
  w.u8(6);
  w.bulk16(tree.n5tileValues);

  const n5keys = sortedKeys(tree.n4map);

  // Pass 1: topology (node4 headers + leaf masks)
  for (const n5k of n5keys) {
    const n4 = tree.n4map.get(n5k);
    w.bulk64(n4.childMask);
    w.bulk64(n4.valueMask);
    w.u8(6);
    w.bulk16(n4.tileValues);
    const n4keys = sortedKeys(n4.leafMap);
    for (const n4k of n4keys) w.bulk64(n4.leafMap.get(n4k).mask);
  }

  // Pass 2: leaf data
  for (const n5k of n5keys) {
    const n4 = tree.n4map.get(n5k);
    const n4keys = sortedKeys(n4.leafMap);
    for (const n4k of n4keys) {
      const leaf = n4.leafMap.get(n4k);
      w.bulk64(leaf.mask);
      w.u8(6);
      w.bulk16(leaf.data);
    }
  }
}

// ============================================================
//  WebGL2 — tiled slice renderer with shell mode
// ============================================================
const VERT = `#version 300 es
void main() {
  vec2 p = vec2((gl_VertexID & 1) * 2 - 1, (gl_VertexID >> 1) * 2 - 1);
  gl_Position = vec4(p, 0, 1);
}`;

const FRAG = `#version 300 es
precision highp float;
uniform float uZ;
uniform float uPower;
uniform int   uIters;
uniform float uInvRes;
uniform vec2  uTileOffset;
uniform float uShellMode;  // 0 = solid (fill interior), 1 = shell only
out vec4 fragColor;

void main() {
  vec3 pos = vec3(
    (gl_FragCoord.x + uTileOffset.x) * uInvRes * 3.0 - 1.5,
    (gl_FragCoord.y + uTileOffset.y) * uInvRes * 3.0 - 1.5,
    uZ * 3.0 - 1.5
  );

  vec3 z = pos;
  float dr = 1.0;
  float r = 0.0;
  bool escaped = false;

  for (int i = 0; i < 30; i++) {
    if (i >= uIters) break;
    r = length(z);
    if (r > 2.0) { escaped = true; break; }
    float theta = acos(clamp(z.z / r, -1.0, 1.0));
    float phi   = atan(z.y, z.x);
    dr = pow(r, uPower - 1.0) * uPower * dr + 1.0;
    float zr = pow(r, uPower);
    theta *= uPower;
    phi   *= uPower;
    z = zr * vec3(sin(theta)*cos(phi), sin(theta)*sin(phi), cos(theta)) + pos;
  }

  float density = 0.0;
  if (!escaped) {
    // Interior: solid mode fills, shell mode skips
    density = uShellMode > 0.5 ? 0.0 : 1.0;
  } else {
    float dist = 0.5 * log(r) * r / dr;
    float voxelSize = 3.0 * uInvRes;
    density = clamp(1.0 - dist / (voxelSize * 2.5), 0.0, 1.0);
  }

  fragColor = vec4(density, 0.0, 0.0, 1.0);
}`;

function compileShader(gl, type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}

function initGL(tileSize) {
  const canvas = document.createElement('canvas');
  canvas.width = tileSize; canvas.height = tileSize;
  const gl = canvas.getContext('webgl2', { antialias: false });
  if (!gl) throw new Error('WebGL2 not supported');
  const prog = gl.createProgram();
  gl.attachShader(prog, compileShader(gl, gl.VERTEX_SHADER, VERT));
  gl.attachShader(prog, compileShader(gl, gl.FRAGMENT_SHADER, FRAG));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(prog));
  gl.useProgram(prog);
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texStorage2D(gl.TEXTURE_2D, 1, gl.RGBA8, tileSize, tileSize);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.viewport(0, 0, tileSize, tileSize);
  gl.bindVertexArray(gl.createVertexArray());
  return { gl, tileSize, loc: {
    uZ:          gl.getUniformLocation(prog, 'uZ'),
    uPower:      gl.getUniformLocation(prog, 'uPower'),
    uIters:      gl.getUniformLocation(prog, 'uIters'),
    uInvRes:     gl.getUniformLocation(prog, 'uInvRes'),
    uTileOffset: gl.getUniformLocation(prog, 'uTileOffset'),
    uShellMode:  gl.getUniformLocation(prog, 'uShellMode'),
  }};
}

function readSlice(ctx, N, zNorm, sliceBuf) {
  const { gl, loc, tileSize } = ctx;
  gl.uniform1f(loc.uZ, zNorm);
  const tilesX = Math.ceil(N / tileSize), tilesY = Math.ceil(N / tileSize);
  const pix = ctx._pix;
  for (let ty = 0; ty < tilesY; ty++) {
    for (let tx = 0; tx < tilesX; tx++) {
      const ox = tx * tileSize, oy = ty * tileSize;
      const tw = Math.min(tileSize, N - ox), th = Math.min(tileSize, N - oy);
      gl.uniform2f(loc.uTileOffset, ox, oy);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      gl.readPixels(0, 0, tw, th, gl.RGBA, gl.UNSIGNED_BYTE, pix);
      for (let row = 0; row < th; row++) {
        const src = row * tw, dst = (oy + row) * N + ox;
        for (let col = 0; col < tw; col++) sliceBuf[dst + col] = pix[(src + col) * 4];
      }
    }
  }
}

// ============================================================
//  Main
// ============================================================
let vdbBlob = null;
const statusEl   = document.getElementById('status');
const progressEl = document.getElementById('progress');
const infoEl     = document.getElementById('info');
const previewCvs = document.getElementById('preview');
const previewCtx = previewCvs.getContext('2d');
const setStatus  = msg => statusEl.textContent = msg;
const setProgress = pct => progressEl.style.width = pct + '%';
const tick = () => new Promise(r => setTimeout(r, 0));

async function generate() {
  const N     = parseInt(document.getElementById('res').value);
  const power = parseFloat(document.getElementById('power').value);
  const iters = parseInt(document.getElementById('iters').value);
  const shell = document.getElementById('mode').value === 'shell' ? 1.0 : 0.0;

  document.getElementById('genBtn').disabled = true;
  document.getElementById('dlBtn').disabled  = true;
  vdbBlob = null; setProgress(0); infoEl.innerHTML = '';

  try {
    setStatus('Initializing WebGL2...');
    await tick();

    // Probe max texture size
    const tmp = document.createElement('canvas'); tmp.width = tmp.height = 1;
    const tgl = tmp.getContext('webgl2');
    const maxTex = tgl ? tgl.getParameter(tgl.MAX_TEXTURE_SIZE) : 4096;
    tgl?.getExtension('WEBGL_lose_context')?.loseContext();

    const tileSize = Math.min(N, maxTex);
    const ctx = initGL(tileSize);
    const { gl, loc } = ctx;
    gl.uniform1f(loc.uPower, power);
    gl.uniform1i(loc.uIters, iters);
    gl.uniform1f(loc.uInvRes, 1.0 / N);
    gl.uniform1f(loc.uShellMode, shell);
    ctx._pix = new Uint8Array(tileSize * tileSize * 4);

    const tree = createTree();
    const bandSlices = Array.from({ length: 8 }, () => new Uint8Array(N * N));
    const leafBlock = new Uint8Array(512);
    const blocksXY = N >> 3, totalBands = N >> 3;

    // Preview
    const tmpC = document.createElement('canvas'); tmpC.width = N; tmpC.height = N;
    const tmpX = tmpC.getContext('2d');
    const imgData = tmpX.createImageData(N, N);

    const t0 = performance.now();
    let voxelCount = 0;

    for (let bandZ = 0; bandZ < totalBands; bandZ++) {
      for (let dz = 0; dz < 8; dz++)
        readSlice(ctx, N, ((bandZ * 8 + dz) + 0.5) / N, bandSlices[dz]);

      for (let by = 0; by < blocksXY; by++) {
        for (let bx = 0; bx < blocksXY; bx++) {
          const ox = bx << 3, oy = by << 3;
          // Quick empty check: sample a few points
          let maybe = true;
          for (let dz = 0; dz < 8; dz += 7) {
            const sl = bandSlices[dz];
            if (sl[oy * N + ox] || sl[oy * N + ox + 7] || sl[(oy+7)*N + ox] || sl[(oy+7)*N + ox+7] || sl[(oy+3)*N + ox+3])
              { maybe = false; break; }
          }
          if (maybe) {
            let empty = true;
            scan: for (let dz = 0; dz < 8; dz++) { const sl = bandSlices[dz];
              for (let ly = 0; ly < 8; ly++) { const r = (oy+ly)*N+ox;
                for (let lx = 0; lx < 8; lx++) if (sl[r+lx]) { empty = false; break scan; }
            }} if (empty) continue;
          }
          // Pack to VDB leaf order
          for (let lz = 0; lz < 8; lz++) { const sl = bandSlices[lz];
            for (let ly = 0; ly < 8; ly++) { const sr = (oy+ly)*N+ox, db = lz|(ly<<3);
              for (let lx = 0; lx < 8; lx++) leafBlock[db|(lx<<6)] = sl[sr+lx];
          }}
          voxelCount += addLeafBlock(tree, bx, by, bandZ, leafBlock);
        }
      }

      // Preview
      if (bandZ % Math.max(1, totalBands >> 5) === 0 || bandZ === totalBands - 1) {
        const sl = bandSlices[7];
        for (let i = 0; i < N * N; i++) { const v = sl[i], j = i << 2;
          imgData.data[j] = v; imgData.data[j+1] = v; imgData.data[j+2] = v; imgData.data[j+3] = 255;
        }
        tmpX.putImageData(imgData, 0, 0);
        previewCtx.drawImage(tmpC, 0, 0, 256, 256);
      }

      setProgress(Math.round(((bandZ+1) / totalBands) * 75));
      setStatus(`Sampling band ${bandZ+1}/${totalBands} \u2014 ${voxelCount.toLocaleString()} voxels`);
      await tick();
    }

    gl.getExtension('WEBGL_lose_context')?.loseContext();
    const t1 = performance.now();

    // Optimize: tile promotion
    setStatus('Optimizing tree (tile promotion)...');
    setProgress(78);
    await tick();

    const opt = optimizeTree(tree);
    const t2 = performance.now();

    // Encode
    setStatus('Encoding VDB...');
    setProgress(85);
    await tick();

    const vdbData = serializeVDB(tree, N);
    const t3 = performance.now();

    vdbBlob = new Blob([vdbData], { type: 'application/octet-stream' });

    setProgress(100);
    setStatus('Done!');

    const sizeMB = (vdbData.byteLength / (1024 * 1024)).toFixed(2);
    const rawLeafMB = (opt.leavesBeforeOpt * 1153 / (1024*1024)).toFixed(0);

    infoEl.innerHTML =
      `${N}\u00B3 grid &middot; ${voxelCount.toLocaleString()} voxels &middot; ` +
      `sample ${((t1-t0)/1000).toFixed(1)}s &middot; ` +
      `optimize ${((t2-t1)/1000).toFixed(1)}s &middot; ` +
      `encode ${((t3-t2)/1000).toFixed(1)}s<br>` +
      `<span class="opt">Tile promotion: ` +
      `${opt.promotedLeaves.toLocaleString()} leaves \u2192 node4 tiles, ` +
      `${opt.promotedN4s} node4s \u2192 node5 tiles &middot; ` +
      `${opt.leavesBeforeOpt.toLocaleString()} leaves \u2192 ${opt.leavesAfterOpt.toLocaleString()} ` +
      `(~${rawLeafMB} MB \u2192 ${sizeMB} MB)</span>`;

    document.getElementById('dlBtn').disabled = false;
  } catch(e) {
    setStatus('Error: ' + e.message);
    console.error(e);
  }
  document.getElementById('genBtn').disabled = false;
}

function download() {
  if (!vdbBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(vdbBlob);
  a.download = 'mandelbulb.vdb';
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>
</body>
</html>
