      /* Boot splash — inline so it paints IMMEDIATELY, before the JS bundle
         parses + React mounts (which is seconds of black otherwise). Lives
         OUTSIDE #root so React's render() never touches it; the app removes it
         only once the engine's first frame has drawn (see FluidToyApp). */
      @keyframes ft-spin { to { transform: rotate(360deg); } }
      #ft-boot-splash {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
        background: #000; color: #9ca3af;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        font-size: 12px; letter-spacing: 0.04em;
        transition: opacity 450ms ease;
      }
      #ft-boot-splash .ft-spinner {
        width: 32px; height: 32px; border-radius: 9999px;
        border: 2px solid rgba(255,255,255,0.15); border-top-color: #22d3ee;
        animation: ft-spin 0.8s linear infinite;
      }
      #ft-boot-splash.ft-hidden { opacity: 0; pointer-events: none; }
