    <style>
      html { background-color: #000; scrollbar-width: thin; scrollbar-color: #333 #000; color-scheme: dark; min-height: 100%; }
      body { margin: 0; padding: 0; width: 100%; min-height: 100%; background-color: #000; overscroll-behavior-y: none; }
      @media (hover: hover) and (pointer: fine) {
        html, body { height: 100vh; overflow: hidden; }
      }
      ::-webkit-scrollbar { width: 3px; height: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
      .mobile-scroll::-webkit-scrollbar { width: 10px; height: 10px; }
      .mobile-scroll::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.25); border-radius: 6px; }

      /* Boot splash — inline so it paints IMMEDIATELY, before the JS bundle
         parses + React mounts (which is seconds of black otherwise). Lives
         OUTSIDE #root so React's render() never touches it; the app removes it
         only once the engine's first frame has drawn (see FluidToyApp). */
      @keyframes ft-spin { to { transform: rotate(360deg); } }
      #ft-boot-splash {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
        background: rgb(var(--app-bg)); color: rgb(var(--fg-dim));
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        font-size: 12px; letter-spacing: 0.04em;
        transition: opacity 450ms ease;
      }
      #ft-boot-splash .ft-spinner {
        width: 32px; height: 32px; border-radius: 9999px;
        border: 2px solid rgb(var(--line) / 0.15); border-top-color: rgb(var(--accent-400));
        animation: ft-spin 0.8s linear infinite;
      }
      #ft-boot-splash.ft-hidden { opacity: 0; pointer-events: none; }
    </style>
