
name: Deploy to GitHub Pages

# Triggers on main → root deploy (gamazama.github.io/GMT-fractals + gmt-fractals.com)
# Triggers on dev  → /dev subfolder deploy (gamazama.github.io/GMT-fractals/dev)
# vite.config.ts uses `base: './'` so the same build works at either location —
# the only difference between deploys is the destination directory in gh-pages.
on:
  push:
    branches: ["main", "dev"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # Only the matching branch's deploy step runs. keep_files: true means
      # main pushes don't wipe /dev and vice-versa — gh-pages branch holds both.
      #
      # Layout:
      #   /dev/index.html    → static landing (lists GMT, fluid-toy, demo, …)
      #   /dev/demo.html     → engine demo app
      #   /dev/<other>.html  → fractal-toy / fluid-toy / app-gmt / mesh-export
      #
      # Both index.html and demo.html are now Vite entries
      # (vite.config.ts rollupOptions.input), so the build produces them
      # directly — no post-build file swap needed.
      - name: Deploy main to root
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true

      - name: Deploy dev to /dev subfolder
        if: github.ref == 'refs/heads/dev'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: dev
          keep_files: true
