
name: Deploy to GitHub Pages

# Triggers on main → root deploy (gamazama.github.io/GMT-fractals + gmt-fractals.com)
# Triggers on dev  → /dev subfolder deploy (gamazama.github.io/GMT-fractals/dev)
# vite.config.ts uses `base: './'` so the same build works at either location —
# the only difference between deploys is the destination directory in gh-pages.
on:
  push:
    branches: ["main", "dev"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # Only the matching branch's deploy step runs. keep_files: true means
      # main pushes don't wipe /dev and vice-versa — gh-pages branch holds both.
      - name: Deploy main to root
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true

      # Replace the legacy index.html with a dev landing page that lists
      # all available app entries and points back to gmt-fractals.com for
      # the live build. dev-landing.html is a static file (not a Vite
      # entry) so it's never included in main builds — safe.
      - name: Swap in dev landing page
        if: github.ref == 'refs/heads/dev'
        run: cp dev-landing.html dist/index.html

      - name: Deploy dev to /dev subfolder
        if: github.ref == 'refs/heads/dev'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: dev
          keep_files: true
